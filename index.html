<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vape Detector</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0a0a0a;
      color: #fff;
      font-family: system-ui, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }

    h1 {
      font-size: 1.6rem;
      margin-bottom: 16px;
      letter-spacing: 0.05em;
      color: #ff4444;
    }

    #camera-container {
      position: relative;
      width: 640px;
      max-width: 100%;
      aspect-ratio: 4/3;
      border-radius: 12px;
      overflow: hidden;
      border: 2px solid #333;
    }

    #webcam, #overlay {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
    }

    #webcam { object-fit: cover; }
    #overlay { pointer-events: none; }

    #status {
      margin-top: 14px;
      font-size: 0.9rem;
      color: #888;
      text-align: center;
    }

    #hud {
      margin-top: 16px;
      display: flex;
      gap: 24px;
      font-size: 0.9rem;
    }

    .hud-item { display: flex; flex-direction: column; align-items: center; gap: 4px; }
    .hud-label { color: #555; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.08em; }
    .hud-value { font-size: 1.1rem; font-weight: 700; color: #777; }
    .hud-value.active { color: #00e676; }
    .hud-value.alert { color: #ff1744; }

    #alert-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(200, 0, 0, 0.93);
      color: white;
      font-size: clamp(2rem, 8vw, 4.5rem);
      font-weight: 900;
      justify-content: center;
      align-items: center;
      text-align: center;
      z-index: 9999;
      cursor: pointer;
      padding: 40px;
      line-height: 1.2;
      animation: pulse 0.3s ease-in-out;
    }

    @keyframes pulse {
      0% { transform: scale(0.95); opacity: 0; }
      100% { transform: scale(1); opacity: 1; }
    }

    #start-btn {
      margin-top: 20px;
      padding: 14px 36px;
      background: #ff4444;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      letter-spacing: 0.05em;
    }
    #start-btn:hover { background: #ff1111; }
    #start-btn:disabled { background: #444; cursor: not-allowed; }
  </style>
</head>
<body>

  <h1>VAPE DETECTOR</h1>

  <div id="camera-container">
    <video id="webcam" autoplay playsinline muted></video>
    <canvas id="overlay"></canvas>
  </div>

  <button id="start-btn">Activer la caméra</button>

  <div id="status">En attente...</div>

  <div id="hud">
    <div class="hud-item">
      <span class="hud-label">Geste</span>
      <span class="hud-value" id="hud-gesture">non</span>
    </div>
    <div class="hud-item">
      <span class="hud-label">Vapeur</span>
      <span class="hud-value" id="hud-vapor">0.00</span>
    </div>
    <div class="hud-item">
      <span class="hud-label">Confiance</span>
      <span class="hud-value" id="hud-conf">0.00</span>
    </div>
  </div>

  <div id="alert-overlay">Tu fais quoi fils de pute</div>

<script type="module">
import {
  FilesetResolver,
  HandLandmarker,
  FaceLandmarker
} from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.34/vision_bundle.mjs";

// ── Config (mirrors config.py) ──────────────────────────────────────────────
const HAND_MOUTH_DISTANCE_RATIO = 0.20;
const VAPOR_THRESHOLD           = 0.10;
const VAPOR_WINDOW_FRAMES       = 8;
const VAPOR_WINDOW_MIN_HITS     = 5;
const GESTURE_COOLDOWN_MS       = 3000;
const ALERT_COOLDOWN_MS         = 15000;
const PROCESS_EVERY_N_FRAMES    = 2;
const WARMUP_FRAMES             = 60;

const HAND_MODEL_URL = "https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/latest/hand_landmarker.task";
const FACE_MODEL_URL = "https://storage.googleapis.com/mediapipe-models/face_landmarker/face_landmarker/float16/latest/face_landmarker.task";

// ── DOM ─────────────────────────────────────────────────────────────────────
const video      = document.getElementById("webcam");
const canvas     = document.getElementById("overlay");
const ctx        = canvas.getContext("2d", { willReadFrequently: true });
const statusEl   = document.getElementById("status");
const alertEl    = document.getElementById("alert-overlay");
const startBtn   = document.getElementById("start-btn");
const hudGesture = document.getElementById("hud-gesture");
const hudVapor   = document.getElementById("hud-vapor");
const hudConf    = document.getElementById("hud-conf");

// ── State ────────────────────────────────────────────────────────────────────
let handLandmarker = null;
let faceLandmarker = null;
let frameCount     = 0;
let lastGestureTime = 0;
let gestureActive   = false;
let mouthBbox       = null;
let lastAlertTime   = 0;
let bgAvg           = null;   // EMA background model (Float32Array, brightness)
let vaporWindow     = [];     // sliding window of vapor scores

// ── Init ─────────────────────────────────────────────────────────────────────
startBtn.addEventListener("click", init);
alertEl.addEventListener("click", () => alertEl.style.display = "none");

async function init() {
  startBtn.disabled = true;
  setStatus("Accès caméra...");

  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { width: 640, height: 480, facingMode: "user" }
    });
    video.srcObject = stream;
    await new Promise(r => video.addEventListener("loadeddata", r, { once: true }));
  } catch (e) {
    setStatus("Erreur caméra : " + e.message);
    startBtn.disabled = false;
    return;
  }

  canvas.width  = video.videoWidth  || 640;
  canvas.height = video.videoHeight || 480;

  setStatus("Chargement des modèles IA...");

  try {
    const fileset = await FilesetResolver.forVisionTasks(
      "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.34/wasm"
    );

    [handLandmarker, faceLandmarker] = await Promise.all([
      HandLandmarker.createFromOptions(fileset, {
        baseOptions: { modelAssetPath: HAND_MODEL_URL, delegate: "GPU" },
        runningMode: "VIDEO",
        numHands: 2,
        minHandDetectionConfidence: 0.5,
        minHandPresenceConfidence: 0.5,
        minTrackingConfidence: 0.5
      }),
      FaceLandmarker.createFromOptions(fileset, {
        baseOptions: { modelAssetPath: FACE_MODEL_URL, delegate: "GPU" },
        runningMode: "VIDEO",
        numFaces: 1,
        minFaceDetectionConfidence: 0.5,
        minFacePresenceConfidence: 0.5,
        minTrackingConfidence: 0.5
      })
    ]);
  } catch (e) {
    setStatus("Erreur chargement modèles : " + e.message);
    startBtn.disabled = false;
    return;
  }

  setStatus("Actif — surveille tes vapes 👁");
  startBtn.style.display = "none";
  requestAnimationFrame(detectLoop);
}

// ── Main Loop ─────────────────────────────────────────────────────────────────
function detectLoop(timestamp) {
  requestAnimationFrame(detectLoop);

  if (video.readyState < 2) return;

  const W = canvas.width;
  const H = canvas.height;

  ctx.drawImage(video, 0, 0, W, H);
  frameCount++;

  // Run ML inference every N frames
  if (frameCount % PROCESS_EVERY_N_FRAMES === 0) {
    const t = performance.now();
    const handResult = handLandmarker.detectForVideo(video, t);
    const faceResult = faceLandmarker.detectForVideo(video, t + 0.1); // slightly offset to avoid duplicate ts
    updateGesture(handResult, faceResult, W, H);
  }

  // Check gesture cooldown
  if (gestureActive && (Date.now() - lastGestureTime) > GESTURE_COOLDOWN_MS) {
    gestureActive = false;
  }

  const vaporScore = frameCount > WARMUP_FRAMES
    ? computeVapor(W, H)
    : 0;

  // Confidence
  let confidence = 0;
  if (gestureActive)               confidence += 0.4;
  if (vaporScore > VAPOR_THRESHOLD) confidence += 0.6;

  maybeAlert(confidence, vaporScore);
  drawDebug(W, H, vaporScore, confidence);
  updateHUD(vaporScore, confidence);
}

// ── Gesture Detection ─────────────────────────────────────────────────────────
function updateGesture(handResult, faceResult, W, H) {
  if (!faceResult.faceLandmarks?.length) return;

  const lm = faceResult.faceLandmarks[0];
  const lipIdx = [13, 14, 61, 291, 0, 17];
  const lipPts = lipIdx.map(i => ({ x: lm[i].x * W, y: lm[i].y * H }));
  const mx = lipPts.reduce((s, p) => s + p.x, 0) / lipPts.length;
  const my = lipPts.reduce((s, p) => s + p.y, 0) / lipPts.length;

  const allY = lm.map(p => p.y * H);
  const faceH = Math.max(...allY) - Math.min(...allY);

  const bw = faceH * 0.6;
  const bh = faceH * 0.4;
  mouthBbox = {
    x: Math.max(0, mx - bw / 2),
    y: Math.max(0, my - bh / 4),
    w: Math.min(bw, W),
    h: Math.min(bh, H)
  };

  if (!handResult.landmarks?.length) return;

  for (const hand of handResult.landmarks) {
    const tipIdx = [4, 8, 12, 16, 20];
    const tips = tipIdx.map(i => ({ x: hand[i].x * W, y: hand[i].y * H }));
    const tx = tips.reduce((s, p) => s + p.x, 0) / tips.length;
    const ty = tips.reduce((s, p) => s + p.y, 0) / tips.length;

    const dist = Math.hypot(tx - mx, ty - my);
    const normDist = dist / (faceH || 1);

    if (normDist < HAND_MOUTH_DISTANCE_RATIO) {
      gestureActive   = true;
      lastGestureTime = Date.now();
      return;
    }
  }
}

// ── Vapor Detection ────────────────────────────────────────────────────────────
function computeVapor(W, H) {
  let rx, ry, rw, rh;

  if (mouthBbox) {
    const { x: bx, y: by, w: bw, h: bh } = mouthBbox;
    ry = Math.max(0, by - bh * 3);
    rh = Math.min(bh * 4, H - ry);
    rx = Math.max(0, bx - bw * 0.25);
    rw = Math.min(bw * 1.5, W - rx);
  } else {
    rx = W / 4; ry = 0; rw = W / 2; rh = H * 2 / 3;
  }

  rw = Math.max(1, Math.floor(rw));
  rh = Math.max(1, Math.floor(rh));
  rx = Math.floor(rx);
  ry = Math.floor(ry);

  let imageData;
  try {
    imageData = ctx.getImageData(rx, ry, rw, rh);
  } catch { return 0; }

  const data   = imageData.data;
  const pixels = rw * rh;

  if (!bgAvg || bgAvg.length !== pixels) {
    bgAvg = new Float32Array(pixels);
    for (let i = 0; i < pixels; i++) {
      const idx = i * 4;
      bgAvg[i] = (data[idx] + data[idx+1] + data[idx+2]) / 3;
    }
    return 0;
  }

  let vaporCount = 0;
  const ALPHA = 0.05;

  for (let i = 0; i < pixels; i++) {
    const idx = i * 4;
    const r = data[idx], g = data[idx+1], b = data[idx+2];
    const brightness = (r + g + b) / 3;
    const satProxy   = Math.max(r, g, b) - Math.min(r, g, b);

    const bright = brightness > 200;
    const desat  = satProxy < 50;
    const moving = Math.abs(brightness - bgAvg[i]) > 30;

    if (bright && desat && moving) vaporCount++;

    // Update EMA background
    bgAvg[i] = ALPHA * brightness + (1 - ALPHA) * bgAvg[i];
  }

  const score = vaporCount / pixels;

  // Sliding window smoothing
  vaporWindow.push(score > VAPOR_THRESHOLD ? 1 : 0);
  if (vaporWindow.length > VAPOR_WINDOW_FRAMES) vaporWindow.shift();
  const hits = vaporWindow.reduce((s, v) => s + v, 0);

  return hits / VAPOR_WINDOW_FRAMES;
}

// ── Alert ─────────────────────────────────────────────────────────────────────
function maybeAlert(confidence, vaporScore) {
  const now = Date.now();
  if (confidence < 0.6) return;
  if (now - lastAlertTime < ALERT_COOLDOWN_MS) return;

  lastAlertTime = now;
  console.log(`[VAPE DETECTED] ${new Date().toLocaleTimeString()} confidence=${confidence.toFixed(2)} vapor=${vaporScore.toFixed(2)}`);

  alertEl.style.display = "flex";
  setTimeout(() => alertEl.style.display = "none", 5000);
}

// ── Debug Overlay ─────────────────────────────────────────────────────────────
function drawDebug(W, H, vaporScore, confidence) {
  // Vapor ROI
  if (mouthBbox) {
    const { x: bx, y: by, w: bw, h: bh } = mouthBbox;
    const ry = Math.max(0, by - bh * 3);
    const rh = Math.min(bh * 4, H - ry);
    const rx = Math.max(0, bx - bw * 0.25);
    const rw = Math.min(bw * 1.5, W - rx);

    ctx.strokeStyle = "rgba(0,255,255,0.6)";
    ctx.lineWidth = 1;
    ctx.strokeRect(rx, ry, rw, rh);

    ctx.strokeStyle = "rgba(0,220,0,0.8)";
    ctx.lineWidth = 2;
    ctx.strokeRect(bx, by, bw, bh);
  }

  // Scores text
  const g = gestureActive;
  ctx.font = "bold 14px monospace";

  ctx.fillStyle = g ? "#00e676" : "#555";
  ctx.fillText(`Geste: ${g ? "OUI" : "non"}`, 10, 25);

  ctx.fillStyle = vaporScore > VAPOR_THRESHOLD ? "#00e676" : "#555";
  ctx.fillText(`Vapeur: ${vaporScore.toFixed(2)}`, 10, 45);

  ctx.fillStyle = confidence >= 0.6 ? "#ff1744" : "#aaa";
  ctx.fillText(`Confiance: ${confidence.toFixed(2)}`, 10, 65);
}

// ── HUD ───────────────────────────────────────────────────────────────────────
function updateHUD(vaporScore, confidence) {
  hudGesture.textContent = gestureActive ? "OUI" : "non";
  hudGesture.className   = "hud-value" + (gestureActive ? " active" : "");

  hudVapor.textContent = vaporScore.toFixed(2);
  hudVapor.className   = "hud-value" + (vaporScore > VAPOR_THRESHOLD ? " active" : "");

  hudConf.textContent = confidence.toFixed(2);
  hudConf.className   = "hud-value" + (confidence >= 0.6 ? " alert" : "");
}

function setStatus(msg) { statusEl.textContent = msg; }
</script>
</body>
</html>
